<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Locação | J.E. Diversões</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<main class="wrap">
  <section class="card">
    <div class="brand">🎤 <b>J.E. Diversões</b></div>
    <h1>Cadastro da locação</h1>
    <p>Preencha os dados abaixo para facilitar a elaboração do contrato.</p>

    <div class="grid">
      <label>Nome/Razão social<input id="nome"></label>
      <label>CPF/CNPJ<input id="doc"></label>
      <label>Telefone<input id="telefone"></label>
      <label>E-mail<input id="email"></label>
      <label>Endereço completo<input id="endereco"></label>
      <label>Data do evento<input id="data" type="date"></label>
      <label>Horário de início<input id="inicio" type="time"></label>
      <label>Horário previsto de retirada<input id="retirada" type="time"></label>
      <label>Local de instalação<input id="local"></label>
      <label>Tipo de evento<input id="evento" placeholder="Aniversário, confraternização..."></label>
      <label>A TV será:
        <select id="tv">
          <option>Contratada com a J.E.</option>
          <option>Fornecida pelo cliente</option>
          <option>A definir</option>
        </select>
      </label>
      <label>Observações<textarea id="obs"></textarea></label>
    </div>

    <div class="notice">
      <b>Antes da instalação</b><br>
      Deixe mesa, tomada e espaço disponíveis. Se a TV for própria, confirme entrada HDMI funcionando.
    </div>

    <div class="actions">
      <button onclick="gerar()">Gerar dados para WhatsApp</button>
      <button class="primary" onclick="enviarWhats()">Enviar para J.E.</button>
    </div>

    <h2>Dados gerados</h2>
    <textarea id="saida" readonly placeholder="Os dados aparecerão aqui..."></textarea>
    <button onclick="copiar()">Copiar dados</button>
  </section>
</main>
<script src="assets/js/app.js"></script>
</body>
</html>
